<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Database</title>
<style>
  :root{
    --navy-50:#e6e6f5; --navy-100:#c2c2e8; --navy-200:#8f8fd1;
    --navy-400:#3d3d9e; --navy-600:#101072; --navy-700:#08084a; --navy-800:#000061; --navy-900:#000040;
    --accent:#9a7b3f; --accent-dark:#6e5829; --accent-light:#f1ead9;
    --bg:#f4f5f7; --bg-card:#ffffff; --bg-panel:#f7f8fa;
    --line:#e2e5ea; --line-strong:#c9ced6;
    --text:#1a1f29; --text-soft:#5b6472; --text-faint:#8a92a0;
    --ok:#2e7d4f; --warn:#b4571c; --danger:#b3372c;
    --radius:10px; --radius-lg:14px;
    --shadow:0 1px 2px rgba(10,15,25,0.06), 0 1px 8px rgba(10,15,25,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:14px;
    line-height:1.6;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}

  /* TOP BAR */
  .topbar{
    background:var(--navy-800);
    color:#f1ede2;
    padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.16);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;
    flex-shrink:0;
  }
  .brand-text h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.02em;color:#fff;}
  .brand-text p{font-size:11px;margin:1px 0 0;color:#9fb0c3;}
  .topnav{display:flex; gap:4px; background:rgba(255,255,255,0.06); padding:3px; border-radius:9px;}
  .topnav button{
    background:transparent;border:none;color:#cfd9e6;font-size:13px;font-weight:500;
    padding:7px 16px;border-radius:7px;cursor:pointer;transition:.15s;font-family:inherit;
  }
  .topnav button.active{background:var(--accent); color:#fff;}
  .topnav button:not(.active):hover{background:rgba(255,255,255,0.08); color:#fff;}
  .top-actions{display:flex; gap:8px; align-items:center;}
  .icon-btn{
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:#e8ecf1;
    width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; font-size:15px;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.16);}

  /* MAIN LAYOUT */
  main{flex:1; max-width:1280px; width:100%; margin:0 auto; padding:20px 24px 64px;}

  /* TOOLBAR */
  .toolbar{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px;
  }
  .search-wrap{position:relative; flex:1; min-width:220px; max-width:420px;}
  .search-wrap input{
    width:100%; padding:9px 12px 9px 34px; border:1px solid var(--line-strong); border-radius:8px;
    font-size:13px; background:#fff; font-family:inherit; color:var(--text);
  }
  .search-wrap input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light);}
  .search-icon{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-size:14px; pointer-events:none;}
  select, .select{
    padding:9px 30px 9px 12px; border:1px solid var(--line-strong); border-radius:8px; font-size:13px;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%23919aa6"/></svg>') no-repeat right 11px center;
    font-family:inherit; color:var(--text); appearance:none; cursor:pointer;
  }
  select:focus{outline:none; border-color:var(--accent);}
  .btn{
    padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
    border:1px solid var(--line-strong); background:#fff; color:var(--text); font-family:inherit;
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .btn:hover{background:var(--bg-panel);}
  .btn-primary{background:var(--navy-700); border-color:var(--navy-700); color:#fff;}
  .btn-primary:hover{background:var(--navy-800);}
  .btn-accent{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn-accent:hover{background:var(--accent-dark);}
  .btn-danger{color:var(--danger); border-color:#e8c4bd;}
  .btn-danger:hover{background:#fdf1ef;}
  .btn-sm{padding:5px 10px; font-size:12px;}
  .spacer{flex:1;}
  .count-pill{
    font-size:12px; color:var(--text-soft); background:var(--bg-panel); border:1px solid var(--line);
    padding:6px 12px; border-radius:20px; white-space:nowrap;
  }

  /* COMPANY GRID */
  .company-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(310px,1fr)); gap:14px;
  }
  .ccard{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:16px 18px; cursor:pointer; transition:.12s; position:relative; box-shadow:var(--shadow);
  }
  .ccard:hover{border-color:var(--navy-400); transform:translateY(-1px);}
  .ccard-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;}
  .ccard-area{
    font-size:11px; font-weight:700; color:var(--navy-600); background:var(--navy-50);
    padding:3px 9px; border-radius:20px; white-space:nowrap; letter-spacing:.02em;
  }
  .ccard-name{font-size:15px; font-weight:600; color:var(--text); margin:0 0 2px; line-height:1.4; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ccard-name-en{font-size:11.5px; color:var(--text-faint); margin:0 0 4px; font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ccard-ceo{font-size:12.5px; color:var(--text-soft); margin:0;}
  .ccard-web-btn{
    width:24px; height:24px; border-radius:6px; border:1px solid var(--line-strong); background:#fff;
    color:var(--navy-700); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    padding:0; flex-shrink:0;
  }
  .ccard-web-btn:hover{background:var(--navy-50); border-color:var(--navy-400);}
  .ccard-meta{margin-top:12px; padding-top:12px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:5px;}
  .ccard-row{display:flex; gap:7px; font-size:12px; color:var(--text-soft); align-items:flex-start;}
  .ccard-row .ico{width:14px; flex-shrink:0; color:var(--text-faint); text-align:center; margin-top:1px;}
  .ccard-row span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ccard-stats{display:flex; gap:8px; margin-top:12px;}
  .stat-chip{
    font-size:11px; font-weight:600; padding:4px 9px; border-radius:6px; background:var(--bg-panel); color:var(--navy-600);
    border:1px solid var(--line);
  }

  /* DETAIL PANEL (slide-over) */
  .overlay{
    position:fixed; inset:0; background:rgba(20,20,18,0.42); display:none; z-index:50;
    align-items:stretch; justify-content:flex-end;
  }
  .overlay.show{display:flex;}
  .drawer{
    width:min(640px, 94vw); background:var(--bg); height:100%; overflow-y:auto;
    box-shadow:-4px 0 24px rgba(0,0,0,0.18); animation:slidein .18s ease-out;
  }
  @keyframes slidein{from{transform:translateX(24px); opacity:.6;} to{transform:translateX(0); opacity:1;}}
  .drawer-head{
    background:var(--navy-800); color:#fff; padding:20px 24px; position:sticky; top:0; z-index:2;
  }
  .drawer-head-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  .drawer-area{font-size:11px; font-weight:700; color:#cfe0f5; background:rgba(255,255,255,0.12); padding:3px 9px; border-radius:20px; display:inline-block; margin-bottom:8px;}
  .drawer-head h2{font-size:18px; margin:0 0 3px; font-weight:600; color:#fff;}
  .drawer-head .ceo{font-size:13px; color:#aebfd8; margin:0;}
  .close-btn{background:rgba(255,255,255,0.1); border:none; color:#fff; width:30px;height:30px;border-radius:7px;cursor:pointer; font-size:15px; flex-shrink:0;}
  .close-btn:hover{background:rgba(255,255,255,0.2);}
  .drawer-tabs{display:flex; gap:4px; margin-top:14px;}
  .drawer-tabs button{
    background:transparent; border:none; color:#aebfd8; font-size:12.5px; font-weight:600; padding:7px 4px;
    cursor:pointer; border-bottom:2px solid transparent; font-family:inherit;
  }
  .drawer-tabs button.active{color:#fff; border-bottom-color:var(--accent);}
  .drawer-body{padding:20px 24px 40px;}
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .field{margin-bottom:4px;}
  .field.full{grid-column:1/-1;}
  .field label{display:block; font-size:11px; font-weight:700; color:var(--text-faint); margin-bottom:4px; text-transform:uppercase; letter-spacing:.03em;}
  .field .val{font-size:13.5px; color:var(--text); white-space:pre-line; word-break:break-word;}
  .field .val.empty{color:var(--text-faint); font-style:italic;}
  .field input, .field textarea{
    width:100%; border:1px solid var(--line-strong); border-radius:7px; padding:8px 10px; font-size:13px;
    font-family:inherit; color:var(--text); background:#fff;
  }
  .field textarea{resize:vertical; min-height:60px; line-height:1.5;}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light);}
  .section-title{font-size:13px; font-weight:700; color:var(--navy-600); margin:22px 0 10px; padding-top:14px; border-top:1px solid var(--line);}
  .section-title:first-child{margin-top:0; padding-top:0; border-top:none;}

  /* VESSEL ROWS IN DRAWER */
  .vessel-mini{
    background:#fff; border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:8px;
    display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer;
  }
  .vessel-mini:hover{border-color:var(--navy-400);}
  .vessel-mini-name{font-weight:600; font-size:13px;}
  .vessel-mini-sub{font-size:11.5px; color:var(--text-soft); margin-top:2px;}
  .badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:5px; white-space:nowrap;}
  .badge-fleet{background:#e3f0e6; color:var(--ok);}
  .badge-order{background:#fdf0e0; color:var(--warn);}
  .badge-sold{background:#f0eee8; color:var(--text-faint);}

  /* VESSEL TABLE VIEW */
  .table-wrap{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden;
    box-shadow:var(--shadow);
  }
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  thead th{
    background:var(--navy-50); color:var(--navy-700); font-weight:700; text-align:left;
    padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; font-size:11.5px;
    letter-spacing:.02em; cursor:pointer; user-select:none;
  }
  thead th:hover{background:var(--navy-100);}
  thead th .sort-ind{color:var(--text-faint); margin-left:3px; font-size:10px;}
  tbody td{padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:top;}
  tbody tr:hover{background:var(--bg-panel);}
  tbody tr{cursor:pointer;}
  tbody tr:last-child td{border-bottom:none;}
  .imo-mono{font-family:var(--font-mono, monospace); color:var(--text-soft); font-size:11.5px;}
  .ellipsis{max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* EMPTY STATE */
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-soft);
  }
  .empty-state .ei{font-size:28px; color:var(--text-faint); margin-bottom:10px;}
  .empty-state p{margin:4px 0; font-size:13px;}

  /* TOAST */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(0);
    background:var(--navy-800); color:#fff; padding:10px 18px; border-radius:9px; font-size:13px;
    box-shadow:0 6px 24px rgba(0,0,0,0.2); z-index:100; opacity:0; pointer-events:none; transition:.2s;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-8px);}

  /* CONFIRM MODAL */
  .modal-overlay{position:fixed; inset:0; background:rgba(20,20,18,0.45); display:none; align-items:center; justify-content:center; z-index:60;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff; border-radius:12px; padding:22px 24px; width:min(380px,90vw); box-shadow:0 12px 40px rgba(0,0,0,0.25);}
  .modal-box h3{margin:0 0 8px; font-size:15px;}
  .modal-box p{margin:0 0 18px; font-size:13px; color:var(--text-soft);}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end;}

  .sr-only{position:absolute; width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  ::placeholder{color:var(--text-faint);}

  @media (max-width: 720px){
    main{padding:16px 12px 48px;}
    .field-grid{grid-template-columns:1fr;}
    .topbar{padding:12px 14px;}
    .topnav button{padding:6px 10px; font-size:12px;}
  }
</style>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>
</head>

function guessColumnMap(headers, hints){
  const map = {};
  Object.keys(hints).forEach(field=>{
    let found = -1;
    for(let i=0;i<headers.length;i++){
      const h = (headers[i]||'').toString().toLowerCase().trim();
      if(!h) continue;
      if(hints[field].some(hint=>h.includes(hint))){ found = i; break; }
    }
    map[field] = found;
  });
  return map;
}

// ---------- storage (Google Sheets) ----------
async function loadData(){
  try{
    showLoadingOverlay('データを読み込み中...');
    const res = await fetch(GAS_URL + '?action=load');
    const json = await res.json();
    if(json.ok && json.data){
      companies = json.data.companies && json.data.companies.length > 0 ? json.data.companies : SEED_COMPANIES.slice();
      vessels = json.data.vessels && json.data.vessels.length > 0 ? json.data.vessels : SEED_VESSELS.slice();
      meetings = json.data.meetings && json.data.meetings.length > 0 ? json.data.meetings : [];
    } else {
      companies = SEED_COMPANIES.slice();
      vessels = SEED_VESSELS.slice();
      meetings = [];
    }
  }catch(e){
    console.error('load error:', e);
    companies = SEED_COMPANIES.slice();
    vessels = SEED_VESSELS.slice();
    meetings = [];
  } finally {
    hideLoadingOverlay();
  }
}

// ---------- import parsing ----------
function parsePastedText(text){
  // tab-separated (from Excel copy) or comma-separated fallback
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.length>0);
  const delim = lines[0] && lines[0].includes('\t') ? '\t' : ',';
  return lines.map(l=>l.split(delim));
}

function parseWorkbookFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const sheetName = wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:false});
        resolve(rows.map(r=>r.map(c=>c===null||c===undefined?'':String(c))));
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function detectHeaderRow(rows){
  // pick the first row with at least 2 non-empty cells as a best guess
  for(let i=0;i<Math.min(rows.length,10);i++){
    const nonEmpty = rows[i].filter(c=>(c||'').toString().trim()!=='').length;
    if(nonEmpty>=2) return i;
  }
  return 0;
}

// ---------- helpers ----------
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
function normalizeUrl(u){
  if(!u) return null;
  const trimmed = u.toString().trim();
  if(!trimmed) return null;
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return 'https://' + trimmed;
}
function fmtNum(n){
  if(n===null||n===undefined||n==='') return '';
  const num = Number(n);
  if(isNaN(num)) return esc(n);
  return num.toLocaleString('en-US');
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 2200);
}
function nextId(arr, key){
  return arr.length ? Math.max(...arr.map(x=>x[key]||0)) + 1 : 1;
}
function companyVessels(cid){
  return vessels.filter(v=>v.company_id===cid);
}
function companyMeetings(cid){
  return meetings.filter(m=>m.company_id===cid).sort((a,b)=> (b.date||'').localeCompare(a.date||''));
}
function fmtDate(d){
  if(!d) return '';
  return d;
}

  if(section==='In Fleet') return '<span class="badge badge-fleet">保有</span>';

}

function uniqueVesselTypes(){

    list = list.filter(v=>{
      const comp = companies.find(c=>c.company_id===v.company_id);
      const compName = comp?comp.name:'';
      return FIELD_ORDER_V.some(f=>(v[f]||'').toString().toLowerCase().includes(q)) || compName.toLowerCase().includes(q);
    });
  }
  list.sort((a,b)=>{
    if(sortCol==='company_name'){
      const ca = companies.find(c=>c.company_id===a.company_id);
      const cb = companies.find(c=>c.company_id===b.company_id);
      return (ca?ca.name:'').localeCompare(cb?cb.name:'', 'ja')*sortDir;
    }
    let av = a[sortCol], bv = b[sortCol];
    if(sortCol==='dwt'||sortCol==='built'){
      av = parseFloat(av)||0; bv = parseFloat(bv)||0;
      return (av-bv)*sortDir;
    }
    av = (av||'').toString(); bv = (bv||'').toString();
    return av.localeCompare(bv,'ja')*sortDir;
  });
  return list;
}

function buildImportRecords(){
  const headers = importRawRows[importHeaderRowIndex] || [];
  const dataRows = importRawRows.slice(importHeaderRowIndex+1).filter(r=>r.some(c=>(c||'').toString().trim()!==''));
  const fields = importTargetType==='companies' ? IMPORT_FIELDS_COMPANY : importTargetType==='vessels' ? IMPORT_FIELDS_VESSEL : IMPORT_FIELDS_MEETING;
  const records = dataRows.map(r=>{
    const rec = {};
    fields.forEach(f=>{
      const idx = importColumnMap[f];
      rec[f] = (idx!==undefined && idx>=0 && r[idx]!==undefined) ? r[idx].toString().trim() : '';
      if(rec[f]==='') rec[f]=null;
    });
    if(importTargetType==='vessels'){
      const sIdx = importColumnMap['section'];
      let sectionRaw = (sIdx!==undefined && sIdx>=0 && r[sIdx]!==undefined) ? r[sIdx].toString().trim().toLowerCase() : '';
      let section = 'In Fleet';
      if(sectionRaw.includes('sold')||sectionRaw.includes('売却')) section='Sold';
      else if(sectionRaw.includes('order')||sectionRaw.includes('建造')) section='Orderbook';
      rec.section = section;
      ['dwt','m3','loa','beam','depth','sale_price'].forEach(nf=>{
        if(rec[nf]!==null && rec[nf]!==undefined){
          const num = parseFloat(rec[nf].toString().replace(/,/g,''));
          rec[nf] = isNaN(num) ? null : num;
        }
      });
      const cIdx = importColumnMap['company_name_col'];
      if(cIdx!==undefined && cIdx>=0 && r[cIdx]!==undefined && r[cIdx].toString().trim()!==''){
        rec._import_company_name = r[cIdx].toString().trim();
      } else {
        rec._import_company_name = null;
      }
    }
    if(importTargetType==='meetings'){
      const cIdx = importColumnMap['company_name_col'];
      if(cIdx!==undefined && cIdx>=0 && r[cIdx]!==undefined && r[cIdx].toString().trim()!==''){
        rec._import_company_name = r[cIdx].toString().trim();
      } else {
        rec._import_company_name = null;
      }
    }
    return rec;
  });
  return records;
}

function renderImportStep3(){
  const records = buildImportRecords();
  const labels = importTargetType==='companies' ? FIELD_LABELS_C : importTargetType==='vessels' ? FIELD_LABELS_V : FIELD_LABELS_M;
  const keyField = importTargetType==='meetings' ? 'date' : 'name';
  const validRecords = records.filter(r=>r[keyField]);
  const invalidCount = records.length - validRecords.length;

  let dupWarnings = [];
  let newCompanyNames = [];
  if(importTargetType==='companies'){
    const existingNames = new Set(companies.map(c=>c.name));
    validRecords.forEach(r=>{ if(existingNames.has(r.name)) dupWarnings.push(r.name); });
  } else if(importTargetType==='vessels') {
    const existingImos = new Set(vessels.map(v=>v.imo).filter(Boolean));
    const existingCompanyNames = new Set(companies.map(c=>c.name));
    validRecords.forEach(r=>{
      if(r.imo && existingImos.has(r.imo)) dupWarnings.push(r.name+' (IMO '+r.imo+')');
      if(r._import_company_name && !existingCompanyNames.has(r._import_company_name) && !newCompanyNames.includes(r._import_company_name)){
        newCompanyNames.push(r._import_company_name);
      }
    });
  } else if(importTargetType==='meetings') {
    const existingCompanyNames = new Set(companies.map(c=>c.name));
    validRecords.forEach(r=>{
      if(r._import_company_name && !existingCompanyNames.has(r._import_company_name) && !newCompanyNames.includes(r._import_company_name)){
        newCompanyNames.push(r._import_company_name);
      }
    });
  }

  const displayFields = importTargetType==='companies' ? IMPORT_FIELDS_COMPANY
    : importTargetType==='vessels' ? ['section','_import_company_name'].concat(IMPORT_FIELDS_VESSEL)
    : ['_import_company_name'].concat(IMPORT_FIELDS_MEETING);

  return `
  <div class="table-wrap" style="padding:22px;">
    <div class="count-pill" style="margin-bottom:14px; display:inline-block;">取り込み対象 ${validRecords.length} 件${invalidCount>0?` ・ ${importTargetType==='meetings'?'日付':'名称'}未入力のためスキップ ${invalidCount} 件`:''}</div>
    ${newCompanyNames.length>0 ? `<p style="font-size:12.5px; color:var(--navy-600); margin:0 0 10px;">ℹ 新しい会社として自動追加されます: ${esc(newCompanyNames.slice(0,8).join('、'))}${newCompanyNames.length>8?' 他':''}</p>` : ''}
    ${dupWarnings.length>0 ? `<p style="font-size:12.5px; color:var(--warn); margin:0 0 14px;">⚠ 既存データと同名/同IMOの可能性があるものが ${dupWarnings.length} 件あります（${esc(dupWarnings.slice(0,5).join('、'))}${dupWarnings.length>5?' 他':''}）。重複登録される場合があるためご注意ください。</p>` : ''}

    <div style="overflow-x:auto; max-height:420px; overflow-y:auto; border:1px solid var(--line); border-radius:8px;">
      <table style="font-size:11.5px;">
        <thead><tr>
          ${displayFields.map(f=>`<th>${esc(f==='_import_company_name'?'会社名':(labels[f]||f))}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${validRecords.slice(0,200).map(r=>`<tr>
            ${displayFields.map(f=>`<td>${esc((r[f]??'').toString().slice(0,40))}</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${validRecords.length>200 ? `<p style="font-size:12px; color:var(--text-soft); margin-top:8px;">表示は先頭200件まで。取り込みは全${validRecords.length}件に適用されます。</p>` : ''}

    <div style="display:flex; gap:8px; margin-top:20px;">
      <button class="btn" id="impBackTo2">戻る</button>
      <button class="btn btn-accent" id="impConfirm" ${validRecords.length===0?'disabled':''}>この内容で取り込む（${validRecords.length}件）</button>
    </div>
  </div>`;
}

function openVesselDrawer(id, presetCompanyId){
  editingVessel = null;

      company_sheet:'', section:'In Fleet', biz:'', type:'', imo:'', name:'', ex_name:'',
      flag:'', dwt:'', m3:'', built:'', loa:'', beam:'', depth:'', shipbuilder:'', charterers:'',
      group_owner:'', registered_owner:'', ship_manager:'', status:'In Service/Commission',
      sale_date:'', sale_price:'', note:''
    };
    renderVesselDrawerOverlay(true);
    return;
  }
  renderVesselDrawerOverlay(false, id);
}

function closeVesselDrawer(){
  const ov = document.getElementById('vesselOverlay');
  if(ov) ov.remove();
  editingVessel = null;
}

function renderVesselDrawerOverlay(isNew, id){
  let ov = document.getElementById('vesselOverlay');
  if(!ov){
    ov = document.createElement('div');
    ov.className = 'overlay show';
    ov.id = 'vesselOverlay';
    document.body.appendChild(ov);
  }
  let v;
  let isEditing = isNew;
  if(isNew){
    v = editingVessel;
  } else {
    v = editingVessel && editingVessel.vessel_id===id ? editingVessel : vessels.find(x=>x.vessel_id===id);
    isEditing = !!(editingVessel && editingVessel.vessel_id===id);
  }
  if(!v){ closeVesselDrawer(); return; }
  const comp = companies.find(c=>c.company_id===v.company_id);

  ov.innerHTML = `
    <div class="drawer">
      <div class="drawer-head">
        <div class="drawer-head-top">
          <div>
            <span class="drawer-area">${esc(v.section==='In Fleet'?'保有':v.section==='Orderbook'?'建造中':v.section==='Sold'?'売却済':'-')}</span>
            <h2>${esc(v.name||(isNew?'新規船舶':'(船名未登録)'))}</h2>
            <p class="ceo">${esc(comp?comp.name:'')}</p>
          </div>
          <button class="close-btn" id="vDrawerClose">✕</button>
        </div>
      </div>
      <div class="drawer-body">
        ${isEditing ? renderVesselEditForm(v, isNew) : renderVesselInfoView(v)}
      </div>
    </div>
  `;
  document.getElementById('vDrawerClose').onclick = closeVesselDrawer;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeVesselDrawer(); });

  if(!isEditing){
    document.getElementById('editVesselBtn').onclick = ()=>{
      editingVessel = JSON.parse(JSON.stringify(v));
      renderVesselDrawerOverlay(false, v.vessel_id);
    };
    document.getElementById('deleteVesselBtn').onclick = ()=> confirmDelete('vessel', v.vessel_id, v.name||'(船名未登録)');
  } else {
    document.getElementById('cancelVesselEditBtn').onclick = ()=>{
      if(isNew){ closeVesselDrawer(); }
      else { editingVessel=null; renderVesselDrawerOverlay(false, v.vessel_id); }
    };
    document.getElementById('saveVesselBtn').onclick = async ()=>{
      const draft = isNew ? editingVessel : editingVessel;
      FIELD_ORDER_V.forEach(f=>{
        const el = document.getElementById('vf_'+f);
        if(el){
          if(f==='dwt'||f==='m3'||f==='loa'||f==='beam'||f==='depth'||f==='sale_price'){
            draft[f] = el.value.trim()===''? null : Number(el.value);
          } else {
            draft[f] = el.value.trim() || null;
          }
        }
      });
      const compSel = document.getElementById('vf_company_id');
      if(compSel) draft.company_id = parseInt(compSel.value);
      const c2 = companies.find(c=>c.company_id===draft.company_id);
      draft.company_sheet = c2 ? c2.name : draft.company_sheet;

      if(isNew){
        draft.vessel_id = nextId(vessels, 'vessel_id');
        vessels.push(draft);
      } else {
        const idx = vessels.findIndex(x=>x.vessel_id===draft.vessel_id);
        vessels[idx] = draft;
      }
      await saveVessels();
      showToast(isNew ? '船舶を追加しました' : '船舶情報を保存しました');
      editingVessel = null;
      closeVesselDrawer();
      render();
    };
  }
}

  pendingDelete = {type, id};
  const modal = document.getElementById('confirmModal');
  const titleMap = {company:'会社を削除しますか？', vessel:'船舶を削除しますか？', meeting:'面談記録を削除しますか？'};
  document.getElementById('confirmTitle').textContent = titleMap[type] || '削除しますか？';
  document.getElementById('confirmMsg').textContent = `「${label}」を削除します。${type==='company' ? 'この会社に登録された船舶・面談記録もあわせて削除されます。' : ''}この操作は取り消せません。`;
  modal.classList.add('show');
}
function setupModal(){
  document.getElementById('confirmCancel').onclick = ()=>{
    document.getElementById('confirmModal').classList.remove('show');
    pendingDelete = null;
  };
  document.getElementById('confirmOk').onclick = async ()=>{
    if(!pendingDelete) return;
    if(pendingDelete.type==='company'){
      companies = companies.filter(c=>c.company_id!==pendingDelete.id);
      vessels = vessels.filter(v=>v.company_id!==pendingDelete.id);
      meetings = meetings.filter(m=>m.company_id!==pendingDelete.id);
      await saveCompanies();
      await saveVessels();
      await saveMeetings();
      closeDrawer();
      showToast('会社を削除しました');
    } else if(pendingDelete.type==='vessel') {
      vessels = vessels.filter(v=>v.vessel_id!==pendingDelete.id);
      await saveVessels();
      closeVesselDrawer();
      showToast('船舶を削除しました');
    } else if(pendingDelete.type==='meeting') {
      meetings = meetings.filter(m=>m.meeting_id!==pendingDelete.id);
      await saveMeetings();
      closeMeetingDrawer();
      showToast('面談記録を削除しました');
    }
    document.getElementById('confirmModal').classList.remove('show');
    pendingDelete = null;
    render();
  };
}

// ---------- export ----------
function exportJSON(){
  const data = {companies, vessels, meetings};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'owners_database_export.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('JSONファイルをダウンロードしました');
}

// ---------- event wiring ----------
function attachGlobalHandlers(){
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.onclick = ()=>{
      const target = btn.dataset.nav;
      if(target==='import' && view!=='import'){
        resetImportWizard();
      }
      view = target;
      render();
    };
  });
  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick = exportJSON;

  if(view==='companies'){
    const s = document.getElementById('companySearch');
    if(s){
      s.oninput = ()=>{ searchQ = s.value; render(); setTimeout(()=>{
        const el = document.getElementById('companySearch');
        if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      },0); };
    }
    const af = document.getElementById('areaFilter');
    if(af) af.onchange = ()=>{ areaFilter = af.value; render(); };
    const addBtn = document.getElementById('addCompanyBtn');
    if(addBtn) addBtn.onclick = openAddCompanyDrawer;
    document.querySelectorAll('[data-company]').forEach(card=>{
      card.onclick = ()=> openCompanyDrawer(parseInt(card.dataset.company));
    });
    document.querySelectorAll('.ccard-web-btn').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const url = btn.dataset.websiteUrl;
        if(url) window.open(url, '_blank', 'noopener,noreferrer');
      };
    });
  } else if(view==='vessels') {
    const s = document.getElementById('vesselSearch');
    if(s){
      s.oninput = ()=>{ vesselSearchQ = s.value; render(); setTimeout(()=>{
        const el = document.getElementById('vesselSearch');
        if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      },0); };
    }
    const cf = document.getElementById('companyFilterSel');
    if(cf) cf.onchange = ()=>{ vesselCompanyFilter = cf.value; render(); };
    const tf = document.getElementById('typeFilterSel');
    if(tf) tf.onchange = ()=>{ vesselTypeFilter = tf.value; render(); };
    const sf = document.getElementById('sectionFilterSel');
    if(sf) sf.onchange = ()=>{ vesselSectionFilter = sf.value; render(); };
    const addV = document.getElementById('addVesselBtn');
    if(addV) addV.onclick = ()=> openVesselDrawer(null);
    document.querySelectorAll('th[data-sort]').forEach(th=>{
      th.onclick = ()=>{
        const col = th.dataset.sort;
        if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
        render();
      };
    });
    document.querySelectorAll('[data-vessel]').forEach(row=>{
      row.onclick = ()=> openVesselDrawer(parseInt(row.dataset.vessel));
    });
  } else if(view==='meetings') {
    const s = document.getElementById('meetingSearch');
    if(s){
      s.oninput = ()=>{ meetingSearchQ = s.value; render(); setTimeout(()=>{
        const el = document.getElementById('meetingSearch');
        if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      },0); };
    }
    const cf = document.getElementById('meetingCompanyFilterSel');
    if(cf) cf.onchange = ()=>{ meetingCompanyFilter = cf.value; render(); };
    const addM = document.getElementById('addMeetingBtn');
    if(addM) addM.onclick = ()=> openMeetingDrawer(null);
    document.querySelectorAll('[data-meeting]').forEach(card=>{
      card.onclick = ()=> openMeetingDrawer(parseInt(card.dataset.meeting));
    });
  } else if(view==='import') {
    attachImportHandlers();
  }
}

function resolveOrCreateCompany(nameToId, importedName){
  if(nameToId[importedName]!==undefined) return nameToId[importedName];
  const newCompany = {
    company_id: nextId(companies, 'company_id'),
    area:null, name:importedName, name_en:null, ceo:null, pic:null, address:null, tel:null,
    mail:null, website:null, registered_owner:null, related_company:null, banks:null, broker:null,
    type_of_vessel:null, shipyard:null, tc_fleet:null, bbc_fleet:null,
    tc_charterer:null, bbc_charterer:null, newbuilding:null
  };
  companies.push(newCompany);
  nameToId[importedName] = newCompany.company_id;
  return newCompany.company_id;
}

function attachImportHandlers(){
  if(importStep===1){
    const btnC = document.getElementById('impTypeCompanies');
    const btnV = document.getElementById('impTypeVessels');
    const btnM = document.getElementById('impTypeMeetings');
    if(btnC) btnC.onclick = ()=>{ importTargetType='companies'; render(); };
    if(btnV) btnV.onclick = ()=>{ importTargetType='vessels'; render(); };
    if(btnM) btnM.onclick = ()=>{ importTargetType='meetings'; render(); };
    const compSel = document.getElementById('impVesselCompany');
    if(compSel) compSel.onchange = ()=>{ importVesselCompanyId = parseInt(compSel.value); };

    const nextBtn = document.getElementById('impNextFromPaste');
    if(nextBtn){
      nextBtn.onclick = async ()=>{
        const errEl = document.getElementById('impStep1Error');
        errEl.textContent = '';
        const fileInput = document.getElementById('impFileInput');
        const pasteArea = document.getElementById('impPasteArea');
        try{
          let rows = [];
          if(fileInput.files && fileInput.files[0]){
            rows = await parseWorkbookFile(fileInput.files[0]);
          } else if(pasteArea.value.trim()){
            rows = parsePastedText(pasteArea.value);
          } else {
            errEl.textContent = 'ファイルを選択するか、表を貼り付けてください。';
            return;
          }
          rows = rows.filter(r=>r.some(c=>(c||'').toString().trim()!==''));
          if(rows.length===0){
            errEl.textContent = 'データを読み取れませんでした。内容を確認してください。';
            return;
          }
          importRawRows = rows;
          importHeaderRowIndex = detectHeaderRow(rows);
          const headers = rows[importHeaderRowIndex];
          const hints = importTargetType==='companies' ? HEADER_HINTS_COMPANY : importTargetType==='vessels' ? HEADER_HINTS_VESSEL : HEADER_HINTS_MEETING;
          importColumnMap = guessColumnMap(headers, hints);
          importStep = 2;
          render();
        }catch(e){
          errEl.textContent = '読み込み中にエラーが発生しました: ' + (e.message||e);
        }
      };
    }
  }

  if(importStep===2){
    const backBtn = document.getElementById('impBackTo1');
    if(backBtn) backBtn.onclick = ()=>{ importStep=1; render(); };
    const headerSel = document.getElementById('impHeaderRowSel');
    if(headerSel){
      headerSel.onchange = ()=>{
        importHeaderRowIndex = parseInt(headerSel.value);
        const headers = importRawRows[importHeaderRowIndex];
        const hints = importTargetType==='companies' ? HEADER_HINTS_COMPANY : importTargetType==='vessels' ? HEADER_HINTS_VESSEL : HEADER_HINTS_MEETING;
        importColumnMap = guessColumnMap(headers, hints);
        render();
      };
    }
    document.querySelectorAll('.impColSel').forEach(sel=>{
      sel.onchange = ()=>{ importColumnMap[sel.dataset.field] = parseInt(sel.value); };
    });
    const next3 = document.getElementById('impNextTo3');
    if(next3){
      next3.onclick = ()=>{
        document.querySelectorAll('.impColSel').forEach(sel=>{
          importColumnMap[sel.dataset.field] = parseInt(sel.value);
        });
        const requiredField = importTargetType==='meetings' ? 'date' : 'name';
        const reqIdx = importColumnMap[requiredField];
        const errEl = document.getElementById('impStep2Error');
        if(reqIdx===undefined || reqIdx<0){
          errEl.textContent = importTargetType==='companies' ? '会社名の列を指定してください。' : importTargetType==='vessels' ? '船名の列を指定してください。' : '日付の列を指定してください。';
          return;
        }
        importStep = 3;
        render();
      };
    }
  }

  if(importStep===3){
    const backBtn = document.getElementById('impBackTo2');
    if(backBtn) backBtn.onclick = ()=>{ importStep=2; render(); };
    const confirmBtn = document.getElementById('impConfirm');
    if(confirmBtn){
      confirmBtn.onclick = async ()=>{
        const requiredField = importTargetType==='meetings' ? 'date' : 'name';
        const records = buildImportRecords().filter(r=>r[requiredField]);
        if(importTargetType==='companies'){
          records.forEach(r=>{
            delete r._import_company_name;
            r.company_id = nextId(companies, 'company_id');
            companies.push(r);
          });
          await saveCompanies();
        } else if(importTargetType==='vessels') {
          const nameToId = {};
          companies.forEach(c=>{ nameToId[c.name] = c.company_id; });
          records.forEach(r=>{
            let cid = importVesselCompanyId;
            const importedName = r._import_company_name;
            delete r._import_company_name;
            if(importedName) cid = resolveOrCreateCompany(nameToId, importedName);
            r.vessel_id = nextId(vessels, 'vessel_id');
            r.company_id = cid;
            const comp = companies.find(c=>c.company_id===cid);
            r.company_sheet = comp ? comp.name : '';
            vessels.push(r);
          });
          await saveCompanies();
          await saveVessels();
        } else if(importTargetType==='meetings') {
          const nameToId = {};
          companies.forEach(c=>{ nameToId[c.name] = c.company_id; });
          records.forEach(r=>{
            let cid = importVesselCompanyId;
            const importedName = r._import_company_name;
            delete r._import_company_name;
            if(importedName) cid = resolveOrCreateCompany(nameToId, importedName);
            r.meeting_id = nextId(meetings, 'meeting_id');
            r.company_id = cid;
            meetings.push(r);
          });
          await saveCompanies();
          await saveMeetings();
        }
        showToast(`${records.length}件を取り込みました`);
        resetImportWizard();
        view = importTargetType==='companies' ? 'companies' : importTargetType==='vessels' ? 'vessels' : 'meetings';
        render();
      };
    }
  }
}

// ---------- init ----------
(async function init(){
  await loadData();
  resetImportWizard();
  render();
  setupModal();
})();
